global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "sglang"
    static_configs:
      - targets: ["inference:8000"]
    metrics_path: /metrics

  - job_name: "backend"
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics
